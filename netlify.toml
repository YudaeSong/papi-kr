[build]
publish = "."
command = ""

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = ""

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000"
Content-Type = "font/woff2"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000"
Content-Type = "image/png"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000"
Content-Type = "image/jpeg"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=31536000"
Content-Type = "image/svg+xml"
