    <script>
        // FAQ 아코디언 (한 번에 하나만 열림)
        document.querySelectorAll('.faq-item .faq-q').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var item = btn.closest('.faq-item');
                var wasOpen = item.classList.contains('open');
                document.querySelectorAll('.faq-item').forEach(function (i) { i.classList.remove('open'); });
                if (!wasOpen) item.classList.add('open');
            });
        });

        // 빈 값이 아닌 항목만 병합 (다른 텍스트가 지워지는 것 방지)
        function mergeNonEmpty(target, source) {
            if (!source) return;
            for (const key in source) {
                const val = source[key];
                if (val !== undefined && val !== null && val !== '') {
                    target[key] = val;
                }
            }
        }

        // 구글 시트(Apps Script 웹앱)에서 데이터 로드
        async function updateFromGoogleSheets() {
            try {
                const data = await loadFromGoogleSheets();
                if (data && typeof data === 'object') {
                    mergeNonEmpty(translations.ko, data.ko);
                    mergeNonEmpty(translations.en, data.en);
                    applyTranslations();
                }
            } catch (error) {
                console.error('시트 로드 실패(기본 콘텐츠 사용):', error);
            }
        }

        // 페이지 로드/새로고침 시 1회만 시트 반영 (주기적 자동 갱신 없음)
        window.addEventListener('load', updateFromGoogleSheets);

        // 설정(⚙️): 관리자 암호 확인 후 구글 시트 열기
        (function () {
            var gear = document.getElementById('admin-gear');
            if (!gear) return;
            gear.addEventListener('click', function (e) {
                e.preventDefault();
                var pw = prompt('관리자 암호를 입력하세요');
                if (pw === null) return; // 취소
                if (pw === 'parapia6907') {
                    window.open(getGoogleSheetsEditUrl(), '_blank');
                } else {
                    alert('암호가 일치하지 않습니다.');
                }
            });
        })();
    </script>
